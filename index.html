<!DOCTYPE html>
<html>
<head>
    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
</head>
<body>
    <h1>Test WebGazer Tối Giản</h1>
    <p>Bấm F12, mở tab Console để xem tọa độ mắt.</p>
    <script>
        window.onload = function() {
            webgazer.setGazeListener(function(data, elapsedTime) {
                if (data == null) return; // Nếu bị lóa/không thấy mắt thì bỏ qua
                console.log("Mắt đang nhìn tọa độ -> X: " + Math.round(data.x) + " | Y: " + Math.round(data.y));
            }).begin();
            
            webgazer.showVideoPreview(true).showPredictionPoints(true);
        };
    </script>
</body>
</html>

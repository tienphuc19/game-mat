<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Hứng Bi - Chạy Local WebGazer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.9); z-index: 100;
        }

        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background-color: #00ffcc; color: #000; border: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
        
        #ball { position: absolute; width: 20px; height: 20px; background-color: #ff3366; border-radius: 50%; top: 50px; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 5; }
        
        #paddle { position: absolute; width: 150px; height: 20px; background-color: #00ffcc; bottom: 30px; left: 50%; transform: translateX(-50%); border-radius: 10px; z-index: 5; transition: left 0.1s ease-out; /* Thêm transition để mượt hơn */ }
        
        #score-board { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; z-index: 50; }
    </style>
    
    <script src="webgazer.js"></script>
</head>
<body>

    <div id="score-board">Điểm: <span id="score">0</span></div>

    <div id="ui-layer">
        <h1>BẢN CHẠY LOCAL (TẢI OFFLINE)</h1>
        <p>Thư viện WebGazer.js đang được load trực tiếp từ ổ cứng của bạn.</p>
        <button onclick="startGame()">▶ BẮT ĐẦU CHƠI</button>
    </div>

    <div id="ball"></div>
    <div id="paddle"></div>

    <script>
        let ball = document.getElementById('ball');
        let paddle = document.getElementById('paddle');
        let scoreElement = document.getElementById('score');
        
        let isPlaying = false;
        let score = 0;
        let ballX = window.innerWidth / 2;
        let ballY = 50;
        let ballSpeedX = 5; let ballSpeedY = 5;

        // Khởi tạo WebGazer ngay lập tức
        window.onload = function() {
            // Xóa toàn bộ dữ liệu máy học cũ lữu trong Local Storage của trình duyệt
            webgazer.clearData(); 

            webgazer.setGazeListener(function(data, elapsedTime) {
                if (data == null) return;
                
                let eyeX = data.x;
                if(eyeX < 75) eyeX = 75; 
                if(eyeX > window.innerWidth - 75) eyeX = window.innerWidth - 75;

                paddle.style.left = eyeX + 'px';
            }).begin();

            webgazer.showVideoPreview(true);
            webgazer.showPredictionPoints(true);
            webgazer.applyKalmanFilter(true);
        };

        function startGame() {
            document.getElementById('ui-layer').style.display = 'none';
            ball.style.display = 'block';
            isPlaying = true;
            score = 0; scoreElement.innerText = score;
            ballY = 50; ballX = Math.random() * window.innerWidth;
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!isPlaying) return;
            ballX += ballSpeedX; ballY += ballSpeedY;

            if (ballX <= 10 || ballX >= window.innerWidth - 10) ballSpeedX = -ballSpeedX;
            if (ballY <= 10) ballSpeedY = -ballSpeedY;

            let paddleRect = paddle.getBoundingClientRect();
            let ballRect = ball.getBoundingClientRect();

            if (ballRect.bottom >= paddleRect.top && ballRect.right >= paddleRect.left && ballRect.left <= paddleRect.right && ballRect.top <= paddleRect.bottom) {
                ballSpeedY = -Math.abs(ballSpeedY);
                score++; scoreElement.innerText = score;
                ballSpeedX *= 1.05; ballSpeedY *= 1.05;
            }

            if (ballY > window.innerHeight) {
                isPlaying = false;
                alert("GAME OVER! Điểm: " + score);
                return;
            }

            ball.style.left = ballX + 'px'; ball.style.top = ballY + 'px';
            requestAnimationFrame(gameLoop);
        }

        window.onbeforeunload = function() { webgazer.end(); }
    </script>
</body>
</html>

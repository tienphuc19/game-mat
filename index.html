<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Hứng Bi Bằng Mắt - Fix Hiện Cam</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/webgazer/2.2.0/webgazer.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #121212; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ÉP BUỘC CAMERA PHẢI NỔI LÊN TRÊN CÙNG */
        #webgazerVideoContainer {
            z-index: 99999 !important;
            display: block !important;
            border: 2px solid #00ffcc;
        }

        /* --- GIAO DIỆN HIỆU CHỈNH --- */
        #calibration-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
        }
        
        #ui-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; 
        }
        
        h1 { color: #ff3366; margin-bottom: 5px; }
        p { font-size: 18px; color: #b0b3b8; }
        
        .calib-btn {
            position: absolute; width: 30px; height: 30px;
            background: #ff3366; border-radius: 50%; cursor: pointer;
            transform: translate(-50%, -50%); border: 3px solid white;
            box-shadow: 0 0 15px #ff3366; transition: opacity 0.2s, transform 0.1s;
            pointer-events: auto;
            display: none; /* Ẩn lúc đang tải cam */
        }
        .calib-btn:active { transform: translate(-50%, -50%) scale(0.8); }

        #pt1 { top: 10%; left: 10%; } #pt2 { top: 10%; left: 50%; } #pt3 { top: 10%; left: 90%; }
        #pt4 { top: 50%; left: 10%; } #pt5 { top: 50%; left: 50%; } #pt6 { top: 50%; left: 90%; }
        #pt7 { top: 90%; left: 10%; } #pt8 { top: 90%; left: 50%; } #pt9 { top: 90%; left: 90%; }

        button.start-btn {
            margin-top: 20px; padding: 15px 30px; font-size: 20px; cursor: pointer;
            background: #00ffcc; color: #000; border: none; border-radius: 50px; 
            font-weight: bold; pointer-events: auto; display: none;
            box-shadow: 0 4px 10px rgba(0,255,204,0.3);
        }
        button.start-btn:hover { background: #00cca3; }

        /* --- GIAO DIỆN GAME --- */
        #game-layer { display: none; }
        
        #ball {
            position: absolute; width: 22px; height: 22px;
            background-color: #ff3366; border-radius: 50%;
            top: 50px; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ff3366;
        }
        
        #paddle {
            position: absolute; width: 160px; height: 20px;
            background-color: #00ffcc; bottom: 40px; left: 50%;
            transform: translateX(-50%); border-radius: 10px;
            box-shadow: 0 0 15px #00ffcc;
        }
        
        #score-board {
            position: absolute; top: 20px; right: 20px; 
            font-size: 28px; font-weight: bold; color: #00ffcc;
        }
    </style>
</head>
<body>

    <div id="calibration-layer">
        <div id="ui-text">
            <h1 id="title">⏳ ĐANG TẢI CAMERA & AI...</h1>
            <p id="subtitle">Vui lòng đợi vài giây để hệ thống khởi động.</p>
            <button class="start-btn" id="startBtn" onclick="startGame()">▶ CHƠI GAME</button>
        </div>
        
        <div class="calib-btn" id="pt1" onclick="calibrate(this)"></div>
        <div class="calib-btn" id="pt2" onclick="calibrate(this)"></div>
        <div class="calib-btn" id="pt3" onclick="calibrate(this)"></div>
        <div class="calib-btn" id="pt4" onclick="calibrate(this)"></div>
        <div class="calib-btn" id="pt5" onclick="calibrate(this)"></div>
        <div class="calib-btn" id="pt6" onclick="calibrate(this)"></div>
        <div class="calib-btn" id="pt7" onclick="calibrate(this)"></div>
        <div class="calib-btn" id="pt8" onclick="calibrate(this)"></div>
        <div class="calib-btn" id="pt9" onclick="calibrate(this)"></div>
    </div>

    <div id="game-layer">
        <div id="score-board">Điểm: <span id="score">0</span></div>
        <div id="ball"></div>
        <div id="paddle"></div>
    </div>

    <script>
        let clickCounts = {};
        let pointsLeft = 9;
        
        let ball = document.getElementById('ball');
        let paddle = document.getElementById('paddle');
        let scoreElement = document.getElementById('score');
        let isPlaying = false;
        let score = 0;
        let ballX = window.innerWidth / 2, ballY = 50;
        let ballSpeedX = 6, ballSpeedY = 6;

        // Dùng async/await để đảm bảo load xong mới hiện giao diện
        window.onload = async function() {
            // Cấu hình chuỗi lệnh chuẩn
            await webgazer.setGazeListener(function(data, elapsedTime) {
                if (data == null || !isPlaying) return;
                
                let eyeX = data.x;
                if(eyeX < 80) eyeX = 80; 
                if(eyeX > window.innerWidth - 80) eyeX = window.innerWidth - 80;
                
                paddle.style.left = eyeX + 'px';
            }).showVideoPreview(true).showPredictionPoints(true).begin();

            // KHI LOAD XONG MỚI CHẠY XUỐNG ĐÂY
            document.getElementById('title').innerText = "BƯỚC 1: DẠY AI NHẬN DIỆN MẮT";
            document.getElementById('subtitle').innerHTML = "Nhìn chằm chằm vào từng chấm đỏ và <b>CLICK 5 LẦN</b> vào nó.";
            
            // Hiện 9 chấm đỏ lên
            let pts = document.getElementsByClassName('calib-btn');
            for(let i=0; i<pts.length; i++) {
                pts[i].style.display = 'block';
            }
        };

        function calibrate(element) {
            let id = element.id;
            if (!clickCounts[id]) clickCounts[id] = 0;
            clickCounts[id]++;
            
            element.style.opacity = 1 - (clickCounts[id] * 0.2);

            if (clickCounts[id] >= 5) {
                element.style.display = 'none';
                pointsLeft--;
                
                if (pointsLeft === 0) {
                    document.getElementById('title').innerText = "✅ HIỆU CHỈNH THÀNH CÔNG!";
                    document.getElementById('title').style.color = "#00ffcc";
                    document.getElementById('subtitle').innerHTML = "Hãy thử liếc mắt xem chấm đỏ mặc định đã di chuyển mượt chưa.<br><br><i>Nếu đã ổn, bấm nút dưới đây để chơi!</i>";
                    document.getElementById('startBtn').style.display = "inline-block";
                }
            }
        }

        function startGame() {
            document.getElementById('calibration-layer').style.display = 'none';
            document.getElementById('game-layer').style.display = 'block';
            
            isPlaying = true;
            ballSpeedX = 6 * (Math.random() > 0.5 ? 1 : -1); 
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!isPlaying) return;
            
            ballX += ballSpeedX; 
            ballY += ballSpeedY;

            if (ballX <= 11 || ballX >= window.innerWidth - 11) ballSpeedX = -ballSpeedX;
            if (ballY <= 11) ballSpeedY = -ballSpeedY;

            let paddleRect = paddle.getBoundingClientRect();
            let ballRect = ball.getBoundingClientRect();

            if (ballRect.bottom >= paddleRect.top && 
                ballRect.right >= paddleRect.left && 
                ballRect.left <= paddleRect.right && 
                ballRect.top <= paddleRect.bottom) {
                
                ballSpeedY = -Math.abs(ballSpeedY);
                score++; 
                scoreElement.innerText = score;
                
                if(Math.abs(ballSpeedY) < 15) { 
                    ballSpeedX *= 1.05; 
                    ballSpeedY *= 1.05; 
                }
            }

            if (ballY > window.innerHeight) {
                isPlaying = false;
                alert("GAME OVER! Điểm của bạn: " + score + "\nBấm F5 hoặc Tải lại trang để chơi tiếp.");
                return;
            }

            ball.style.left = ballX + 'px'; 
            ball.style.top = ballY + 'px';
            
            requestAnimationFrame(gameLoop);
        }

        window.onbeforeunload = function() { 
            webgazer.end(); 
        }
    </script>
</body>
</html>
